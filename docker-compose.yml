version: '3.8'

# ASM Platform - Hybrid Container Architecture (v1.0)
# - Scanner: Host Network (고속 스캐닝 및 사내망 패킷 유실 방지)
# - Platform: Bridge Network (내부 격리 및 보안)

services:
  # ==========================================
  # 1. Scanner Node (Phase 1 & 2)
  # ==========================================
  # ==========================================
  # 1. Scanner Node (Phase 1 & 2)
  # ==========================================
  scanner-node:
    build: 
      context: .
      dockerfile: docker/Dockerfile.scanner
    container_name: asm_scanner
    # [격리] 안정성을 위해 호스트 네트워크 대신 브리지 네트워크 사용
    # network_mode: "host" (제거됨)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      # 서비스 이름을 사용하여 내부망으로 DB 접근
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - TZ=${TZ}
    volumes:
      - ./data/outputs:/app/outputs:rw
    depends_on:
      db:
        condition: service_healthy
    command: tail -f /dev/null

  # ==========================================
  # 2. ASM Database (Phase 3)
  # ==========================================
  db:
    image: postgres:15.6-alpine
    container_name: asm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TZ}
    ports:
      # 127.0.0.1 바인딩으로 외부 접근 차단 (Ubuntu 호스트 및 Host Net 컨테이너만 접근 가능)
      - "127.0.0.1:${HOST_DB_PORT}:5432"
    volumes:
      - asm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # 3. Message Queue & Cache (Phase 3/4)
  # ==========================================
  redis:
    image: redis:7.2-alpine
    container_name: asm_redis
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${HOST_REDIS_PORT}:6379"
    volumes:
      - asm_redis_data:/data

  # ==========================================
  # 4. Platform API & Admin Dashboard (Phase 4 예정)
  # ==========================================
  # platform-api:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.api
  #   container_name: asm_platform
  #   restart: unless-stopped
  #   environment:
  #     - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
  #     - REDIS_URL=redis://redis:6379/0
  #     - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
  #   ports:
  #     - "127.0.0.1:${API_PORT}:8000"
  #   depends_on:
  #     - db
  #     - redis

volumes:
  asm_pgdata:
  asm_redis_data:
